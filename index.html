<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocab Lab Omni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
    <style>
        /* ══ DARK THEME (默认) ══ */
        :root, [data-theme="dark"] {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #22253a;
            --border: rgba(255,255,255,0.07);
            --accent: #7c6af5;
            --accent-soft: rgba(124,106,245,0.15);
            --green: #2dd4a0;
            --green-soft: rgba(45,212,160,0.12);
            --yellow: #f5c518;
            --text-1: #e8eaf6;
            --text-2: #8b90b8;
            --text-3: #555a80;
            --shadow: rgba(0,0,0,0.4);
            --topbar-bg: #1a1d27;
            --scrollbar: rgba(255,255,255,0.1);
        }

        /* ══ LIGHT THEME ══ */
        [data-theme="light"] {
            --bg: #f5f0e8;
            --surface: #fdfaf5;
            --surface-2: #ede8df;
            --border: rgba(0,0,0,0.08);
            --accent: #d97757;           
            --accent-soft: rgba(217,119,87,0.09);
            --green: #2a9d6e;
            --green-soft: rgba(42,157,110,0.1);
            --yellow: #b07d2a;
            --text-1: #1f1b16;
            --text-2: #6b5f52;
            --text-3: #a89a8a;
            --shadow: rgba(80,50,20,0.09);
            --topbar-bg: #fdfaf5;
            --scrollbar: rgba(0,0,0,0.1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text-1);
            height: 100dvh;
            display: flex;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

        .sidebar {
            width: 220px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, border-color 0.3s;
        }
        .sidebar-header {
            padding: 20px 16px 14px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h2 {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 300;
            font-size: 18px;
            color: var(--text-1);
        }
        .sidebar-header span {
            font-size: 10px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            display: block;
            margin-top: 3px;
        }
        #suffix-container { overflow-y: auto; flex: 1; padding: 8px 0; }

        .filter-btn {
            width: 100%; border: none;
            padding: 10px 16px; text-align: left;
            background: transparent; cursor: pointer;
            color: var(--text-2);
            border-left: 3px solid transparent;
            transition: all 0.15s;
            display: flex; align-items: baseline; gap: 8px;
        }
        .filter-btn:hover { background: var(--surface-2); color: var(--text-1); }
        .filter-btn.active { background: var(--accent-soft); color: var(--accent); border-left-color: var(--accent); }
        .filter-btn .sfx { font-size: 13px; font-weight: 500; }
        .filter-btn .meaning { font-size: 10px; color: var(--text-3); }
        .filter-btn.active .meaning { color: var(--accent); opacity: 0.7; }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

        .top-bar {
            padding: 10px 16px;
            background: var(--topbar-bg);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            gap: 8px; flex-wrap: wrap; z-index: 100;
            transition: background 0.3s, border-color 0.3s;
        }
        .stats-badge {
            font-size: 12px; color: var(--text-2);
            background: var(--surface-2);
            padding: 5px 12px; border-radius: 20px;
            border: 1px solid var(--border);
            white-space: nowrap; flex-shrink: 0;
        }
        .stats-badge b { color: var(--green); }
        #vocabSelect {
            padding: 5px 10px; border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface-2); color: var(--text-1);
            font-family: 'DM Mono', monospace; font-size: 12px;
            cursor: pointer; max-width: 140px;
            transition: background 0.3s;
        }
        #vocabSelect:focus { outline: 1px solid var(--accent); }
        #pos-container { display: flex; gap: 5px; flex-wrap: wrap; }
        .pos-btn {
            padding: 4px 10px;
            border: 1px solid var(--border);
            background: transparent; color: var(--text-2);
            border-radius: 20px; cursor: pointer;
            font-size: 11px; font-family: 'DM Mono', monospace;
            transition: all 0.15s;
        }
        .pos-btn:hover { border-color: var(--accent); color: var(--accent); }
        .pos-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .toggle-all-btn {
            padding: 5px 12px;
            border: 1px solid var(--yellow);
            background: transparent; color: var(--yellow);
            border-radius: 20px; cursor: pointer;
            font-size: 11px; font-family: 'DM Mono', monospace;
            transition: all 0.15s; white-space: nowrap;
        }
        .toggle-all-btn:hover, .toggle-all-btn.active { background: var(--yellow); color: #111; }

        .theme-toggle {
            position: fixed;
            top: 12px; right: 16px;
            z-index: 9999;
            display: flex; align-items: center; gap: 6px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'DM Mono', monospace;
            color: var(--text-2);
            transition: all 0.2s;
            box-shadow: 0 2px 8px var(--shadow);
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

        #grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 12px;
            padding: 16px;
            overflow-y: auto;
            align-content: start;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s, background 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
            height: auto;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); border-color: var(--accent); }
        .card.viewed { border-left: 3px solid var(--green); }
        .card.speaking { border-color: var(--green); box-shadow: 0 0 0 2px var(--green-soft); }

        .card-inner {
            padding: 14px 14px 12px;
            display: flex; flex-direction: column; gap: 7px;
        }
        .word-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 6px;
        }
        .word-text {
            font-family: 'Fraunces', serif;
            font-size: 18px; font-weight: 700;
            color: var(--text-1);
            word-break: break-word;
            overflow-wrap: anywhere;
            line-height: 1.25;
            flex: 1; min-width: 0;
        }

        /* 音标样式 */
        .word-ipa {
            font-size: 11px;
            color: var(--accent);
            font-family: sans-serif;
            margin-top: -2px;
            min-height: 14px;
            opacity: 0.8;
        }

        .card-links {
            display: flex; gap: 4px;
            flex-shrink: 0;
            align-items: flex-start;
            opacity: 0; transition: opacity 0.15s;
        }
        .card:hover .card-links { opacity: 1; }
        .dict-link {
            text-decoration: none;
            font-size: 10px;
            font-family: 'DM Mono', monospace;
            padding: 2px 6px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text-2);
            transition: all 0.15s;
            white-space: nowrap;
            line-height: 1.5;
        }
        .dict-link.en-cn { border-color: var(--green); color: var(--green); }
        .dict-link.en-en { border-color: var(--accent); color: var(--accent); }
        .dict-link.en-cn:hover { background: var(--green); color: #fff; }
        .dict-link.en-en:hover { background: var(--accent); color: #fff; }

        .word-def {
            font-size: 12px; color: var(--text-2);
            line-height: 1.65;
            opacity: 0; max-height: 0; overflow: hidden;
            transition: opacity 0.2s, max-height 0.3s ease;
            word-break: break-word;
        }
        .card:hover .word-def,
        .card.viewed .word-def,
        .show-all-def .word-def {
            opacity: 1;
            max-height: 300px;
        }
        .highlight { color: var(--accent); font-weight: 500; }

        .skeleton {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .skeleton-line {
            background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface) 50%, var(--surface-2) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite; border-radius: 6px;
        }
        .skeleton-line.title { height: 20px; width: 65%; }
        .skeleton-line.sub { height: 11px; }
        .skeleton-line.sub2 { height: 11px; width: 80%; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .empty-state {
            grid-column: 1 / -1; text-align: center;
            padding: 60px 20px; color: var(--text-3);
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
        .empty-state p { font-size: 13px; line-height: 1.8; }

        .mobile-bottom-nav {
            display: none;
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 60px;
            background: var(--topbar-bg);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(12px);
            overflow-x: auto; align-items: center;
            padding: 0 12px; gap: 8px;
            z-index: 200; transition: transform 0.3s;
        }
        .suffix-pill {
            flex-shrink: 0; padding: 6px 12px;
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 20px; font-size: 12px; color: var(--text-2);
            cursor: pointer; white-space: nowrap;
            font-family: 'DM Mono', monospace; transition: all 0.15s;
        }
        .suffix-pill.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-bottom-nav { display: flex; }
            #grid { padding-bottom: 76px; grid-template-columns: 1fr 1fr; }
            .top-bar { padding: 8px 10px; gap: 6px; padding-right: 90px; }
            .word-def { opacity: 1 !important; max-height: 300px !important; }
        }
        @media (max-width: 480px) { #grid { grid-template-columns: 1fr; } }

        .show-all-def .word-def { opacity: 1 !important; max-height: 300px !important; }
        .nav-hidden-top { transform: translateY(-110%); }
        .nav-hidden-bottom { transform: translateY(110%); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2>Suffix Lab</h2>
        <span>Explorer</span>
    </div>
    <div id="suffix-container"></div>
</div>

<div class="main">
    <div class="top-bar" id="topBar">
        <div class="stats-badge">
            <b id="match-count">0</b> / <span id="total-count">0</span>
            &nbsp;<span style="opacity:.6">(<b id="match-percent">0%</b>)</span>
        </div>
        <select id="vocabSelect"><option>Loading…</option></select>
        <div id="pos-container"></div>
        <button class="toggle-all-btn" id="toggleAllBtn">👁 Show All</button>
    </div>
    <div id="grid"></div>
    <div class="mobile-bottom-nav" id="mobileBottomNav"></div>
</div>

<button class="theme-toggle" id="themeToggle">
    <span id="themeIcon">☀️</span>
    <span id="themeLabel">Light</span>
</button>

<script>
const Papa = {
    parse(text) {
        return { data: text.split(/\r?\n/).map(line => {
            const cols = []; let cur = '', inQ = false;
            for (const c of line) {
                if (c === '"') { inQ = !inQ; continue; }
                if (c === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
                cur += c;
            }
            cols.push(cur); return cols;
        })};
    }
};

function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('vocab-theme', t);
    document.getElementById('themeIcon').textContent  = t === 'light' ? '🌙' : '☀️';
    document.getElementById('themeLabel').textContent = t === 'light' ? 'Dark' : 'Light';
}
applyTheme(localStorage.getItem('vocab-theme') || 'dark');
document.getElementById('themeToggle').addEventListener('click', () => {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

let vocab = [], suffixList = [], currentFilter = { suffix: null, pos: 'All' };
let lastScrollTop = 0, showAllDef = false;
const isMobile = () => window.innerWidth <= 768;

function showSkeletons(n = 12) {
    document.getElementById('grid').innerHTML = Array(n).fill(
        `<div class="skeleton">
            <div class="skeleton-line title"></div>
            <div class="skeleton-line sub"></div>
            <div class="skeleton-line sub2"></div>
        </div>`
    ).join('');
}

window.addEventListener('load', () => {
    showSkeletons();
    fetch('data/list.json')
        .then(r => r.json())
        .then(data => {
            const sel = document.getElementById('vocabSelect');
            sel.innerHTML = '';
            data.vocabs.forEach(n => {
                const o = document.createElement('option');
                o.value = `data/${n}`; o.textContent = n.replace('.csv','');
                sel.appendChild(o);
            });
            Promise.all([
                data.vocabs[0]     ? loadVocab(`data/${data.vocabs[0]}`)    : Promise.resolve(),
                data.suffixes?.[0] ? loadSuffix(`data/${data.suffixes[0]}`) : Promise.resolve()
            ]);
        })
        .catch(() => showError('无法加载 data/list.json，请检查文件路径'));
});

function loadVocab(url) {
    showSkeletons();
    return fetch(url).then(r => r.text()).then(text => {
        const { data } = Papa.parse(text.trim());
        vocab = data.filter(r => r[0] && r[1]).map(r => ({
            word: r[0].trim(), def: r[1].trim(), pos: r[1].match(/[a-z]+\./g) || []
        }));
        updatePOSMenu(); applyFilters();
    }).catch(() => showError('词汇文件加载失败：' + url));
}

function loadSuffix(url) {
    return fetch(url).then(r => r.text()).then(text => {
        suffixList = [];
        Papa.parse(text.trim()).data.forEach(r => {
            if (!r[0]) return;
            r[0].split('/').forEach(p => {
                const s = p.replace('-','').trim();
                if (s) suffixList.push({ suffix: s, meaning: r[1] || '' });
            });
        });
        renderSuffixControls();
    });
}

function updatePOSMenu() {
    const box = document.getElementById('pos-container');
    box.innerHTML = '';
    ['All', ...new Set(vocab.flatMap(v => v.pos))].forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'pos-btn' + (p === currentFilter.pos ? ' active' : '');
        btn.textContent = p;
        btn.onclick = () => { currentFilter.pos = p; updatePOSMenu(); applyFilters(); };
        box.appendChild(btn);
    });
}

function renderSuffixControls() {
    ['suffix-container','mobileBottomNav'].forEach(id => document.getElementById(id).innerHTML = '');
    const items = [{ suffix: null, meaning: '' }, ...suffixList];
    items.forEach(item => {
        const isActive = currentFilter.suffix === item.suffix;
        const label = item.suffix || 'All';

        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (isActive ? ' active' : '');
        btn.innerHTML = `<span class="sfx">${label}</span><span class="meaning">${item.meaning}</span>`;
        btn.onclick = () => toggleSuffix(item.suffix);
        document.getElementById('suffix-container').appendChild(btn);

        const pill = document.createElement('div');
        pill.className = 'suffix-pill' + (isActive ? ' active' : '');
        pill.innerHTML = `<b>${label}</b>${item.meaning ? ` <span style="font-size:10px;opacity:.6">${item.meaning}</span>` : ''}`;
        pill.onclick = () => toggleSuffix(item.suffix);
        document.getElementById('mobileBottomNav').appendChild(pill);
    });
}

function toggleSuffix(s) {
    currentFilter.suffix = currentFilter.suffix === s ? null : s;
    renderSuffixControls(); applyFilters();
    if (isMobile()) window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ══ 获取音标逻辑 ══ */
async function fetchIPA(word, element) {
    try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
        if (!res.ok) return;
        const data = await res.json();
        const ipa = data[0].phonetics.find(p => p.text)?.text || data[0].phonetic || "";
        if (ipa) {
            element.textContent = ipa;
            element.animate([{ opacity: 0 }, { opacity: 0.8 }], { duration: 300, fill: 'forwards' });
        }
    } catch (e) {}
}

/* ══ 懒加载观察者 ══ */
const ipaObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const card = entry.target;
            const ipaEl = card.querySelector('.word-ipa');
            if (ipaEl && !ipaEl.textContent) {
                fetchIPA(card.dataset.word, ipaEl);
            }
            ipaObserver.unobserve(card);
        }
    });
}, { threshold: 0.1 });

function applyFilters() {
    let f = vocab;
    if (currentFilter.pos !== 'All') f = f.filter(v => v.pos.includes(currentFilter.pos));
    if (currentFilter.suffix) {
        const s = currentFilter.suffix.toLowerCase();
        f = f.filter(v => v.word.toLowerCase().endsWith(s) || v.word.toLowerCase().includes(s));
    }

    document.getElementById('match-count').textContent   = f.length;
    document.getElementById('total-count').textContent   = vocab.length;
    document.getElementById('match-percent').textContent =
        vocab.length ? ((f.length/vocab.length)*100).toFixed(1)+'%' : '0%';

    const grid = document.getElementById('grid');
    if (!f.length) {
        grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>没有匹配的词汇<br>换个条件试试</p></div>`;
        return;
    }

    const frag = document.createDocumentFragment();
    const sfxReg = currentFilter.suffix ? new RegExp(currentFilter.suffix+'$','i') : null;

    f.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.word = item.word; // 用于懒加载识别

        let wordHTML = esc(item.word);
        if (sfxReg) wordHTML = wordHTML.replace(sfxReg, m => `<span class="highlight">${m}</span>`);

        const w = encodeURIComponent(item.word);
        const eudicUrl   = `https://dict.eudic.net/dicts/en/${w}`;
        const onelookUrl = `https://www.onelook.com/?w=${w}`;

        card.innerHTML = `
            <div class="card-inner">
                <div class="word-header">
                    <div class="word-text">${wordHTML}</div>
                    <div class="card-links">
                        <a href="${eudicUrl}"   target="_blank" class="dict-link en-cn">中文</a>
                        <a href="${onelookUrl}" target="_blank" class="dict-link en-en">EN↗</a>
                    </div>
                </div>
                <div class="word-ipa"></div> <div class="word-def">${esc(item.def)}</div>
            </div>`;

        card.addEventListener('click', e => {
            if (e.target.closest('a')) return;
            card.classList.add('speaking', 'viewed');
            const audio = new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(item.word)}&type=2`);
            audio.play();
            audio.onended = () => card.classList.remove('speaking');
        });

        frag.appendChild(card);
        ipaObserver.observe(card); // 启动观察
    });

    grid.innerHTML = '';
    grid.appendChild(frag);
    if (showAllDef) grid.classList.add('show-all-def');
}

document.getElementById('toggleAllBtn').addEventListener('click', function() {
    showAllDef = !showAllDef;
    document.getElementById('grid').classList.toggle('show-all-def', showAllDef);
    this.classList.toggle('active', showAllDef);
    this.textContent = showAllDef ? '🙈 Hide All' : '👁 Show All';
});

document.getElementById('vocabSelect').addEventListener('change', e => loadVocab(e.target.value));

window.addEventListener('scroll', () => {
    if (!isMobile()) return;
    const st = window.pageYOffset;
    const down = st > lastScrollTop && st > 60;
    document.getElementById('topBar').classList.toggle('nav-hidden-top', down);
    document.getElementById('mobileBottomNav').classList.toggle('nav-hidden-bottom', down);
    lastScrollTop = Math.max(0, st);
}, { passive: true });

const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function showError(msg) {
    document.getElementById('grid').innerHTML =
        `<div class="empty-state"><div class="icon">⚠️</div><p>${msg}</p></div>`;
}
</script>
</body>
</html>
